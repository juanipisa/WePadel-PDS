spring.application.name=wepadel-pds

# Necesario para la UI Swing: Spring Boot pone headless=true por defecto en apps sin web
spring.main.headless=false

spring.datasource.url=jdbc:mysql://localhost:3306/wepadel_pds
spring.datasource.username=root
spring.datasource.password=${BD_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
