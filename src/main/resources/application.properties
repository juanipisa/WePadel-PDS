spring.application.name=wepadel-pds

# MySQL (Workbench): servicio MySQL en localhost:3306, schema wepadel_pds
# Contraseña: variable de entorno BD_PASSWORD (ver .vscode/launch.json o README)
spring.datasource.url=jdbc:mysql://localhost:3306/wepadel_pds?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${BD_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Necesario para la UI Swing: Spring Boot pone headless=true por defecto en apps sin web
spring.main.headless=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
